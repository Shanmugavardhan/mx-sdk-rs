version: "3.9"

services:
  chain-simulator:
    image: multiversx/chainsimulator:latest
    ports:
      - "8085:8085"
    entrypoint: "./chainsimulator -log-level *:INFO -server-port 8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/simulator/observers"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
